<!DOCTYPE html>
<html lang="ja">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <meta name="description" content="1回10分でサクッと解ける学習クイズ。デザインパターン・SOLID原則などのジャンルから選んで挑戦!">
  <meta name="theme-color" content="#4f46e5">
  <title>Daily 10min Quiz</title>
  <link rel="stylesheet" href="css/style.css">
  <link rel="icon" href="data:image/svg+xml,<svg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 100 100'><text y='.9em' font-size='90'>⏱️</text></svg>">
</head>
<body>
  <header class="app-header">
    <h1 class="app-title" id="app-title">⏱️ Daily 10min Quiz</h1>
  </header>

  <main id="app">
    <!-- カテゴリ選択画面 -->
    <section id="screen-home" class="screen">
      <p class="lead">1回10分。ジャンルを選んでスタート!</p>
      <div id="category-list" class="category-list"></div>
    </section>

    <!-- モード選択画面(クイズ or 概要) -->
    <section id="screen-mode" class="screen hidden">
      <div class="quiz-header">
        <button id="btn-mode-back" class="btn-text" type="button">← カテゴリ選択に戻る</button>
      </div>
      <h2 id="mode-category-name" class="mode-category-name"></h2>
      <div class="category-list">
        <button id="btn-mode-quiz" class="category-card" type="button">
          <span class="cat-icon">📝</span><span class="cat-name">クイズに挑戦</span>
          <p class="cat-desc">ランダムに10問出題。回答するとその場で解説が読めます。</p>
          <span class="cat-meta" id="mode-quiz-meta">全10問・約10分</span>
        </button>
        <button id="btn-mode-learn" class="category-card" type="button">
          <span class="cat-icon">📚</span><span class="cat-name">概要を学ぶ</span>
          <p class="cat-desc">このカテゴリの考え方を、コード例つきの解説でひとつずつ確認できます。</p>
          <span class="cat-meta" id="mode-learn-meta"></span>
        </button>
      </div>
    </section>

    <!-- 概要(学習)画面 -->
    <section id="screen-learn" class="screen hidden">
      <div class="quiz-header">
        <button id="btn-learn-back" class="btn-text" type="button">← 戻る</button>
        <span id="learn-title" class="progress-label"></span>
        <span></span>
      </div>
      <p id="learn-intro" class="learn-intro"></p>
      <div id="learn-content"></div>
      <button id="btn-learn-quiz" class="btn btn-primary learn-quiz-btn" type="button">このカテゴリのクイズに挑戦</button>
    </section>

    <!-- クイズ画面 -->
    <section id="screen-quiz" class="screen hidden">
      <div class="quiz-header">
        <button id="btn-quit" class="btn-text" type="button">← やめる</button>
        <span id="quiz-progress-label" class="progress-label"></span>
        <span id="quiz-timer" class="timer">0:00</span>
      </div>
      <div class="progress-bar"><div id="progress-fill" class="progress-fill"></div></div>

      <div class="question-card">
        <p id="question-text" class="question-text"></p>
        <pre id="question-code" class="question-code hidden"><code></code></pre>
      </div>

      <div id="choices" class="choices"></div>

      <div id="feedback" class="feedback hidden">
        <p id="feedback-result" class="feedback-result"></p>
        <p id="feedback-explanation" class="feedback-explanation"></p>
        <div id="feedback-details"></div>
        <button id="btn-next" class="btn btn-primary" type="button">次の問題へ</button>
      </div>
    </section>

    <!-- 結果画面 -->
    <section id="screen-result" class="screen hidden">
      <div class="result-card">
        <p class="result-emoji" id="result-emoji"></p>
        <p class="result-score"><span id="result-score"></span></p>
        <p class="result-detail" id="result-detail"></p>
      </div>
      <h2 class="review-title">ふりかえり</h2>
      <div id="review-list" class="review-list"></div>
      <div class="result-actions">
        <button id="btn-retry" class="btn btn-primary" type="button">もう一度挑戦</button>
        <button id="btn-home" class="btn btn-secondary" type="button">カテゴリ選択に戻る</button>
      </div>
    </section>
  </main>

  <footer class="app-footer">
    <p>毎日10分、コツコツ学習 💪</p>
  </footer>

  <script src="data/concepts.js"></script>
  <script src="data/questions.js"></script>
  <script src="js/app.js"></script>
</body>
</html>
